<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "简易社交平台" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('common.index') }}">CampusCircle</a>
      <nav class="nav">
        {% if session.user_id %}
          <a href="{{ url_for('moments.moments') }}">朋友圈</a>
          <a href="{{ url_for('friends.friends') }}">好友</a>
          <a href="{{ url_for('profile.profile') }}">个人</a>
          <a href="{{ url_for('common.logout') }}">登出</a>
        {% elif session.admin_id %}
          <a href="{{ url_for('admin.admin_panel') }}" class="nav-admin">管理员面板</a>
          <a href="{{ url_for('common.logout') }}">登出</a>
        {% else %}
          <a href="{{ url_for('moments.moments') }}">朋友圈</a>
          <a href="{{ url_for('auth.register') }}">注册</a>
          <a href="{{ url_for('auth.login') }}">登录</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-list">
          {% for m in messages %}
            <div class="flash">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
