{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>用户注册</h2>
  <form method="post" class="form">
    <label>用户名
      <input name="username" required>
    </label>
    <label>密码
      <input type="password" name="password" required>
    </label>
    <label>确认密码
      <input type="password" name="confirm_password" required>
    </label>
    <button class="btn primary" type="submit">注册</button>
  </form>
</section>
{% endblock %}
