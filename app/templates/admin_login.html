{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>管理员登录</h2>
  <form method="post" class="form">
    <label>用户名
      <input name="username" required>
    </label>
    <label>密码
      <input type="password" name="password" required>
    </label>
    <button class="btn primary" type="submit">登录</button>
  </form>
</section>
{% endblock %}
